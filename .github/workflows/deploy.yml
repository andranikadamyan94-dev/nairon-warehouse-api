name: Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "main" ]; then
              REPO_DIR=/opt/nairon/nairon-warehouse-api
              ENV_DIR=/opt/nairon/production
            else
              REPO_DIR=/opt/nairon/staging-src/nairon-warehouse-api
              ENV_DIR=/opt/nairon/staging
            fi
            git -C $REPO_DIR fetch origin
            git -C $REPO_DIR checkout $BRANCH
            git -C $REPO_DIR pull origin $BRANCH
            # Inject inter-service env vars (remove old values, append fresh ones)
            touch $ENV_DIR/.env
            sed -i '/^FINANCE_API_URL=/d;/^INTERNAL_API_KEY=/d' $ENV_DIR/.env
            echo "FINANCE_API_URL=${{ secrets.STAGING_FINANCE_API_URL }}" >> $ENV_DIR/.env
            echo "INTERNAL_API_KEY=${{ secrets.STAGING_INTERNAL_API_KEY }}" >> $ENV_DIR/.env
            cd $ENV_DIR
            docker compose build warehouse-api
            docker compose up -d --no-deps warehouse-api
            echo "Deployed warehouse-api to $BRANCH"