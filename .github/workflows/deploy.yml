name: Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "main" ]; then
              REPO_DIR=/opt/nairon/nairon-warehouse-api
              ENV_DIR=/opt/nairon/production
            else
              REPO_DIR=/opt/nairon/staging-src/nairon-warehouse-api
              ENV_DIR=/opt/nairon/staging
            fi
            git -C $REPO_DIR fetch origin
            git -C $REPO_DIR checkout $BRANCH
            git -C $REPO_DIR pull origin $BRANCH
            cd $ENV_DIR
            # Write override file so Docker Compose injects env vars into the container
            cat > $ENV_DIR/docker-compose.warehouse-override.yml << 'OVERRIDE'
services:
  warehouse-api:
    environment:
      FINANCE_API_URL: "${{ secrets.STAGING_FINANCE_API_URL }}"
      INTERNAL_API_KEY: "${{ secrets.STAGING_INTERNAL_API_KEY }}"
OVERRIDE
            docker compose -f docker-compose.yml -f docker-compose.warehouse-override.yml build warehouse-api
            docker compose -f docker-compose.yml -f docker-compose.warehouse-override.yml up -d --no-deps warehouse-api
            echo "Deployed warehouse-api to $BRANCH"