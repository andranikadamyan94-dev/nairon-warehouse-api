name: Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            SRC_BRANCH=$([ "$BRANCH" = "main" ] && echo "main" || echo "staging")
            git -C /opt/nairon/nairon-warehouse-api fetch origin
            git -C /opt/nairon/nairon-warehouse-api checkout $SRC_BRANCH
            git -C /opt/nairon/nairon-warehouse-api pull origin $SRC_BRANCH

            ENV=$([ "$BRANCH" = "main" ] && echo "production" || echo "staging")
            cd /opt/nairon/$ENV
            docker compose build warehouse-api
            docker compose up -d --no-deps warehouse-api
            echo "Deployed warehouse-api to $ENV"
