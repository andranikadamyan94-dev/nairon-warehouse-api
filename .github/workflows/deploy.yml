name: Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  check-migrations:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check schema matches migrations
        env:
          SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/shadow_db
        run: |
          npx prisma migrate diff \
            --from-migrations ./prisma/migrations \
            --to-schema-datamodel ./prisma/schema.prisma \
            --shadow-database-url "$SHADOW_DATABASE_URL" \
            --exit-code

  deploy:
    runs-on: ubuntu-latest
    needs: check-migrations
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            if [ "$BRANCH" = "main" ]; then
              REPO_DIR=/opt/nairon/nairon-warehouse-api
              ENV_DIR=/opt/nairon/production
            else
              REPO_DIR=/opt/nairon/staging-src/nairon-warehouse-api
              ENV_DIR=/opt/nairon/staging
            fi
            git -C $REPO_DIR fetch origin
            git -C $REPO_DIR checkout $BRANCH
            git -C $REPO_DIR pull origin $BRANCH
            cd $ENV_DIR
            docker compose build warehouse-api
            docker compose up -d --no-deps warehouse-api
            echo "Deployed warehouse-api to $BRANCH"
